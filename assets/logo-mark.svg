<svg width="120" height="120" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Toukin">
  <defs>
    <clipPath id="tk-circle"><circle cx="50" cy="50" r="50"/></clipPath>
  </defs>
  <g clip-path="url(#tk-circle)">
    <rect x="0" y="0" width="100" height="100" fill="#FFFFFF"/>
    <!-- bottom-left: black body -->
    <rect x="0" y="50" width="50" height="50" fill="#1C1B1A"/>
    <!-- top-right: black base, then amber beak leaving the outer black sliver -->
    <rect x="50" y="0" width="50" height="50" fill="#1C1B1A"/>
    <rect x="50" y="0" width="37" height="50" fill="#F5A623"/>
    <!-- eye -->
    <circle cx="30" cy="27" r="7.4" fill="#1C1B1A"/>
  </g>
</svg>
